<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Mellow Bot - Profile</title>
    <link rel="shortcut icon" href="{{ url_for('static', filename='img/mellowbot.png') }}" type="image/x-icon" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Same fonts as chat UI -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />

<style>
  :root {
    --bg-main: #f3fbf6;        /* page background */
    --card-bg: #ffffff;
    --accent: #2f8c5c;         /* main green */
    --accent-soft: #bfe7cf;    /* light green */
    --text-main: #1f2933;
    --text-muted: #6b7280;
    --border-soft: #cfe6d8;
    --danger: #b91c1c;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: 'Inter', 'Nunito', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #e6f5ec 0, #f3fbf6 40%, #f6fcf8 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-main);
    padding: 16px;
  }

  .profile-shell {
    width: 100%;
    max-width: 480px;
    background: rgba(255, 255, 255, 0.95);
    box-shadow: 0 18px 45px rgba(47, 140, 92, 0.18);
    border-radius: 24px;
    border: 1px solid var(--border-soft);
    padding: 24px 26px 22px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .profile-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 4px;
  }

  .profile-header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .profile-title-block {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .profile-title {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.01em;
  }

  .profile-subtitle {
    font-size: 13px;
    color: var(--text-muted);
  }

  .back-link {
    font-size: 13px;
    color: var(--accent);
    text-decoration: none;
    font-weight: 500;
    padding: 6px 10px;
    border-radius: 999px;
    background: rgba(47, 140, 92, 0.06);
    border: 1px solid rgba(47, 140, 92, 0.18);
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }

  .back-link:hover {
    background: rgba(47, 140, 92, 0.12);
  }

  .profile-form {
    margin-top: 4px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .field-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .field-label {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
  }

  .field-input-wrapper {
    position: relative;
    display: flex;
    align-items: center;
  }

  .field-input {
    width: 100%;
    border-radius: 12px;
    border: 1px solid var(--border-soft);
    padding: 9px 11px;
    font-size: 14px;
    outline: none;
    background: #f9fbfa;
    transition: border-color 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
  }

  .field-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px rgba(47, 140, 92, 0.3);
    background: #ffffff;
  }

  .field-input[readonly] {
    background: #edf7f1;
    color: var(--text-muted);
    cursor: default;
  }

  .password-toggle {
    position: absolute;
    right: 10px;
    font-size: 12px;
    color: var(--text-muted);
    cursor: pointer;
    user-select: none;
  }

  .helper-text {
    font-size: 12px;
    color: var(--text-muted);
  }

  .alert {
    font-size: 13px;
    padding: 8px 10px;
    border-radius: 10px;
    border: 1px solid;
  }

  .alert-success {
    border-color: #16a34a;
    background: #ecfdf3;
    color: #166534;
  }

  .alert-error {
    border-color: var(--danger);
    background: #fef2f2;
    color: var(--danger);
  }

  .profile-actions {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-top: 4px;
  }

  .btn-primary {
    border-radius: 999px;
    border: none;
    background: var(--accent);
    color: #ffffff;
    padding: 10px 18px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    box-shadow: 0 5px 14px rgba(47, 140, 92, 0.5);
    transition: background 0.15s ease, transform 0.1s ease, box-shadow 0.1s ease;
  }

  .btn-primary:hover {
    background: #27734d;
    transform: translateY(-1px);
    box-shadow: 0 7px 18px rgba(47, 140, 92, 0.6);
  }

  .btn-primary:active {
    transform: translateY(0);
    box-shadow: 0 3px 9px rgba(47, 140, 92, 0.45);
  }

  .secondary-note {
    font-size: 12px;
    color: var(--text-muted);
    text-align: right;
  }

  @media (max-width: 600px) {
    .profile-shell {
      border-radius: 18px;
      padding: 18px 16px 16px;
    }
  }
</style>

  </head>
  <body>
    <div class="profile-shell">
      <header class="profile-header">
        <div class="profile-header-left">
          <div class="profile-title-block">
            <div class="profile-title">Account settings</div>
            <div class="profile-subtitle">Manage your Mellow Bot profile.</div>
          </div>
        </div>
        <a class="back-link" href="{{ url_for('home') }}">← Back to chat</a>
      </header>

      {% if message %}
        <div class="alert alert-success">{{ message }}</div>
      {% endif %}

      {% if error %}
        <div class="alert alert-error">{{ error }}</div>
      {% endif %}

      <form class="profile-form" method="POST" action="{{ url_for('profile') }}">
        <div class="field-group">
          <label class="field-label" for="name">Display name</label>
          <input class="field-input" type="text" id="name" name="name" value="{{ user.name }}" autocomplete="name" required />
        </div>

        <div class="field-group">
          <label class="field-label" for="email">Email</label>
          <input class="field-input" type="email" id="email" name="email" value="{{ user.email }}" readonly />
          <div class="helper-text">Your login email cannot be changed here.</div>
        </div>

        <div class="field-group">
          <label class="field-label" for="new_password">New password</label>
          <div class="field-input-wrapper">
            <input class="field-input" type="password" id="new_password" name="new_password" autocomplete="new-password" />
            <span class="password-toggle" data-target="new_password">Show</span>
          </div>
        </div>

        <div class="field-group">
          <label class="field-label" for="confirm_password">Confirm new password</label>
          <div class="field-input-wrapper">
            <input class="field-input" type="password" id="confirm_password" name="confirm_password" autocomplete="new-password" />
            <span class="password-toggle" data-target="confirm_password">Show</span>
          </div>
          <div class="helper-text">Leave both password fields empty if you do not want to change it.</div>
        </div>

        <div class="profile-actions">
          <button type="submit" class="btn-primary">Save changes</button>
          <div class="secondary-note">
            Logged in as <strong>{{ user.email }}</strong>
          </div>
        </div>
      </form>
    </div>

    <script>
      // Simple show / hide password toggle
      document.querySelectorAll('.password-toggle').forEach((toggle) => {
        toggle.addEventListener('click', () => {
          const targetId = toggle.getAttribute('data-target')
          const input = document.getElementById(targetId)
          if (!input) return
      
          if (input.type === 'password') {
            input.type = 'text'
            toggle.textContent = 'Hide'
          } else {
            input.type = 'password'
            toggle.textContent = 'Show'
          }
        })
      })
    </script>
  </body>
</html>

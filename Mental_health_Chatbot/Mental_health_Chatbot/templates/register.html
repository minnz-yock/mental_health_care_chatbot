<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Mellow Bot - Register</title>
    <link rel="shortcut icon" href="{{ url_for('static', filename='img/mellowbot.png') }}" type="image/x-icon" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <style>
      :root {
        --green-main: #2f8c5c; /* primary green */
        --green-dark: #27734d;
        --green-soft: #dff7eb; /* light background green */
        --green-soft-2: #eef9f3; /* surface gradient */
        --text-main: #1f2a1f;
        --text-muted: #6b7d6e;
        --border-radius-lg: 18px;
      }
      
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      
      body {
        min-height: 100vh;
        background: radial-gradient(circle at top right, #e6f5ec 0, #f3fbf6 40%, #ffffff 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-main);
      }
      
      .auth-wrapper {
        width: 100%;
        max-width: 460px;
        padding: 24px;
      }
      
      .auth-card {
        background: linear-gradient(145deg, var(--green-soft-2), #ffffff);
        border-radius: 24px;
        padding: 28px 26px 30px;
        box-shadow: 0 18px 45px rgba(47, 140, 92, 0.14), 0 0 0 1px rgba(255, 255, 255, 0.8);
      }
      
      .auth-header {
        display: flex;
        align-items: center;
        margin-bottom: 20px;
        gap: 12px;
      }
      
      .auth-logo {
        width: 80px;
        height: 80px;
        border-radius: 16px;
        overflow: hidden;
        background: #e5f6ed;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 6px 14px rgba(0, 0, 0, 0.05);
      }
      
      .auth-logo img {
        width: 90%;
        height: 90%;
        object-fit: contain; /* important: no cropping */
        transform: none;
      }
      
      .auth-title-block {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      
      .auth-title {
        font-size: 22px;
        font-weight: 600;
        color: var(--text-main);
      }
      
      .auth-subtitle {
        font-size: 13px;
        color: var(--text-muted);
      }
      
      .auth-heading {
        margin-top: 4px;
        margin-bottom: 22px;
      }
      
      .auth-heading h2 {
        font-size: 18px;
        font-weight: 600;
        margin-bottom: 4px;
      }
      
      .auth-heading p {
        font-size: 13px;
        color: var(--text-muted);
      }
      
      form {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      
      .form-row {
        display: flex;
        gap: 10px;
      }
      
      .form-row > .form-group {
        flex: 1;
      }
      
      .form-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      
      label {
        font-size: 13px;
        font-weight: 500;
        color: var(--text-main);
      }
      
      .input-wrapper {
        position: relative;
      }
      
      input[type='email'],
      input[type='password'],
      input[type='text'] {
        width: 100%;
        padding: 10px 12px;
        border-radius: var(--border-radius-lg);
        border: 1px solid #cfe6d8;
        background: rgba(255, 255, 255, 0.9);
        font-size: 14px;
        color: var(--text-main);
        outline: none;
        transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
      }
      
      input:focus {
        border-color: var(--green-main);
        box-shadow: 0 0 0 2px rgba(47, 140, 92, 0.22);
        background: #ffffff;
      }
      
      .toggle-password {
        position: absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 12px;
        color: var(--text-muted);
        cursor: pointer;
        user-select: none;
        padding: 3px 6px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.7);
      }
      
      .auth-actions {
        margin-top: 6px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      
      .btn-primary {
        width: 100%;
        border: none;
        border-radius: 999px;
        padding: 10px 16px;
        background: linear-gradient(135deg, var(--green-main), var(--green-dark));
        color: #fff;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 12px 24px rgba(47, 140, 92, 0.25);
        transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.12s ease;
      }
      
      .btn-primary:hover {
        transform: translateY(-1px);
        filter: brightness(1.03);
        box-shadow: 0 16px 32px rgba(47, 140, 92, 0.32);
      }
      
      .btn-primary:active {
        transform: translateY(0);
        box-shadow: 0 8px 18px rgba(47, 140, 92, 0.22);
      }
      
      .auth-footer {
        margin-top: 10px;
        font-size: 13px;
        color: var(--text-muted);
        text-align: center;
      }
      
      .auth-footer a {
        color: var(--green-main);
        text-decoration: none;
        font-weight: 500;
      }
      
      .auth-footer a:hover {
        text-decoration: underline;
      }
      
      .flash-messages {
        margin-bottom: 8px;
        font-size: 13px;
        color: #b91c1c;
      }
      
      @media (max-width: 520px) {
        .form-row {
          flex-direction: column;
        }
        .auth-card {
          padding: 22px 18px 24px;
        }
      }
    </style>
  </head>
  <body>
    <div class="auth-wrapper">
      <div class="auth-card">
        <div class="auth-header">
          <div class="auth-logo">
            <img src="{{ url_for('static', filename='img/mellowbot.png') }}" alt="Mellow Bot Logo" />
          </div>
          <div class="auth-title-block">
            <div class="auth-title">Mellow Bot</div>
            <div class="auth-subtitle">Create your safe space.</div>
          </div>
        </div>

        <div class="auth-heading">
          <h2>Create an account</h2>
          <p>We’ll use this to save your chat history.</p>
        </div>

        {% with messages=get_flashed_messages() %}
          {% if messages %}
            <div class="flash-messages">
              {% for message in messages %}
                <div>{{ message }}</div>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('register') }}" autocomplete="off">
          <input type="text" name="fakeuser" style="display:none" autocomplete="off" />
          <input type="password" name="fakepass" style="display:none" autocomplete="new-password" />

          <div class="form-row">
            <div class="form-group">
              <label for="name">Name</label>
              <div class="input-wrapper">
                <input type="text" id="name" name="name" placeholder="Your name" required autocomplete="off" />
              </div>
            </div>

            <div class="form-group">
              <label for="email">Email</label>
              <div class="input-wrapper">
                <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="off" />
              </div>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="password">Password</label>
              <div class="input-wrapper">
                <input type="password" id="password" name="password" placeholder="Create a password" required autocomplete="new-password" />
                <span class="toggle-password" data-target="password">Show</span>
              </div>
            </div>

            <div class="form-group">
              <label for="confirm_password">Confirm password</label>
              <div class="input-wrapper">
                <input type="password" id="confirm_password" name="confirm_password" placeholder="Repeat password" required autocomplete="new-password" />
                <span class="toggle-password" data-target="confirm_password">Show</span>
              </div>
            </div>
          </div>

          <div class="auth-actions">
            <button type="submit" class="btn-primary">Create account</button>
          </div>
        </form>

        <div class="auth-footer">
          Already have an account?
          <a href="{{ url_for('login') }}">Log in instead</a>
        </div>
      </div>
    </div>

    <script>
      // Show / hide passwords
      document.querySelectorAll('.toggle-password').forEach(function (toggle) {
        toggle.addEventListener('click', function () {
          const targetId = this.getAttribute('data-target')
          const input = document.getElementById(targetId)
          if (!input) return
      
          if (input.type === 'password') {
            input.type = 'text'
            this.textContent = 'Hide'
          } else {
            input.type = 'password'
            this.textContent = 'Show'
          }
        })
      })
    </script>
  </body>
</html>
